services:

  # ── PostgreSQL + TimescaleDB ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: pulse_postgres
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse_secret
      POSTGRES_DB: pulse_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pulse_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pulse_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: pulse
      RABBITMQ_DEFAULT_PASS: pulse_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── Collector (Go) ────────────────────────────────────────────────────────
  collector:
    build:
      context: ../services/collector
      dockerfile: Dockerfile
    container_name: pulse_collector
    environment:
      PORT: "8081"
      POSTGRES_DSN: "postgres://pulse:pulse_secret@postgres:5432/pulse_db?sslmode=disable"
      RABBITMQ_URL: "amqp://pulse:pulse_secret@rabbitmq:5672/"
      CB_MAX_REQUESTS: "3"
      CB_INTERVAL_SECS: "10"
      CB_TIMEOUT_SECS: "30"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Gateway (NestJS) ──────────────────────────────────────────────────────
  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    container_name: pulse_gateway
    environment:
      PORT: "3000"
      COLLECTOR_URL: "http://collector:8081"
      POSTGRES_DSN: "postgres://pulse:pulse_secret@postgres:5432/pulse_db"
      JWT_SECRET: "dev_secret_change_in_prod"
      NODE_ENV: "development"
    ports:
      - "3000:3000"
    depends_on:
      collector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: pulse_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: pulse_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
